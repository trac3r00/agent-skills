name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test deps
        run: pip install pytest tiktoken
      - name: Run tests
        run: pytest tests/ -q
      - name: Smoke — context-budget self-audit
        run: python skills/context-budget/scripts/context_budget.py skills README.md --top 5
      - name: Smoke — claim-audit
        run: echo "The sky is green. See https://example.com for the real color." | python skills/claim-audit/scripts/claim_audit.py -
